- name: "DP250100582 Discovery Projects"
  detail: "Privacy-Aware Intelligent Digital Twin for Secure Critical Infrastructures."
  summary: "This project aims to address system privacy, trustworthiness, and efficient resource management within Digital Twins-based critical infrastructure. It expects to advance new knowledge in the area of intelligent systems and cybersecurity in the context of Digital Twins-based applications in smart critical infrastructures. Expected outcomes include an efficient, intelligent Digital Twin that provides data privacy and integrity by utilizing encryption techniques, machine learning techniques, and blockchain. It is expected that the outcomes of this project will benefit Australian Critical Infrastructures by providing the system with cost-efficiency and privacy, while increasing its trustworthiness and quality of services."
  funder: "Australian Research Council"
