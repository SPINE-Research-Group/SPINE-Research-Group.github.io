- name: "LP240100417 Linkage Projects"
  detail: "Federated Fine-Tuning Framework for Secure and Collaborative GenAI Models."
  summary: "This project aims to develop a federated fine-tuning framework for Large Language Models (LLMs) and Multimodal Foundation Models (MFMs), utilizing distributed and private data. By incorporating a strong focus on security and privacy, this project seeks to generate new knowledge in the area of federated fine-tuning techniques for LLMs/MFMs. Expected outcomes of this project include the creation of a versatile framework for federated fine-tuning that prioritizes privacy and security. The project's advancements will significantly benefit sectors like healthcare, energy, and finance, by offering reliable, secure, and privacy-assured solutions through Generative AI to enhance Australia's workforce capabilities and drive economic growth."
  funder: "Australian Research Council"
