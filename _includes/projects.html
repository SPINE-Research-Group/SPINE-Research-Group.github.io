<section id="projects">
  <div class="container">
    <h2>Projects</h2>
    <p class="projects-subtitle">Selected projects from our research program.</p>
    <div class="projects-grid">
      {% for project in site.data.projects %}
      <div class="project-card">
        <h3>{{ project.title }}</h3>
        <p>{{ project.description }}</p>
        {% if project.publications %}
        <div class="project-pubs">
          {% for pub in project.publications %}
          <a href="{{ pub.anchor }}" class="pub-link-badge">
            {{ pub.label }}
            <svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M1.5 8.5L8.5 1.5M8.5 1.5H3.5M8.5 1.5V6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
          {% endfor %}
        </div>
        {% endif %}
      </div>
      {% endfor %}
    </div>
  </div>
</section>
