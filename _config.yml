title: 'SPINE Research Group'
description: 'Security - Privacy - Intelligence - Edge Computing'
url: 'https://spine-research-group.github.io'
baseurl: ''
permalink: pretty

collections:
  services:
    output: false
  team:
    output: false
  people:
    output: true
    permalink: /:path/
  past_members:
    output: false
  news:
    output: true
    permalink: /news/:path/
  publications:
    output: false
  alumni:
    output: false
  hiring_descriptions:
    output: false

sass:
  style: compressed
  implementation: sassc

plugins:
  - jekyll-environment-variables

defaults:
  - scope:
      path: ""
      type: "people"
    values:
      layout: person
  - scope:
      path: ""
      type: "news"
    values:
      layout: singlenews

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - LICENSE.md
  - LICENSE
  - README.md
  - design_reference.md
