- name: "LP250200550 Linkage Projects"
  detail: "Privacy Aware Secure Quantum Machine Learning Platform."
  summary: "This project aims to improve the security and privacy of quantum artificial intelligence systems by developing a safe and privacy-focused framework for quantum federated learning. It expects to create new knowledge by combining ideas from quantum computing and secure distributed learning. The expected outcomes include better models for quantum threats, new methods to protect private data, and systems that explain how quantum decisions are made. This work helps Australia safely use quantum technology in areas like health and finance, reduce energy use, and support growth in the emerging quantum security sector."
